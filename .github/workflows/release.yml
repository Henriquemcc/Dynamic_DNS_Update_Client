name: Java CI with Gradle and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Generate installation package for Red Hat based distros
        run: ./gradlew buildRpm

      - name: Generate installation package for Debian based distros
        run: ./gradlew buildDeb

      - name: Upload Linux Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-artifacts
          path: |
            app/build/libs/*.jar
            app/build/distributions/*.rpm
            app/build/distributions/*.deb

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.103'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Downloads WinSW executables with Gradle
        run: ./gradlew downloadWinSw

      - name: Prepares installer files with Gradle
        run: ./gradlew prepareInstallerFiles

      - name: Generate installation package for Windows
        working-directory: installer
        run: powershell.exe -File .\Build.ps1 -Version ${{ github.ref_name }}

      - name: Upload Windows Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-artifacts
          path: |
            installer/**/*.msi

  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [build-linux, build-windows]

    steps:
      - name: Download Linux Artifacts
        uses: actions/download-artifact@v4
        with:
          name: linux-artifacts
          path: ./dist/linux

      - name: Download Windows Artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-artifacts
          path: ./dist/windows

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            ./dist/linux/app/build/libs/*.jar
            ./dist/linux/app/build/distributions/*.rpm
            ./dist/linux/app/build/distributions/*.deb
            ./dist/windows/installer/**/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true