name: Java CI with Gradle and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Generate installation package for Red Hat based distros
        run: ./gradlew buildRpm

      - name: Generate installation package for Debian based distros
        run: ./gradlew buildDeb

      - name: Uploading artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-linux
          path: |
            app/build/libs/*.jar
            app/build/distributions/*.rpm
            app/build/distributions/*.deb

  build-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.103'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Downloads WinSW executables with Gradle
        run: ./gradlew downloadWinSw

      - name: Prepares installer files with Gradle
        run: ./gradlew prepareInstallerFiles

      - name: Generate installation package for Windows
        working-directory: installer
        run: powershell.exe -File .\Build.ps1 -Version ${{ github.ref_name }}

      - name: Uploading artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-windows
          path: installer/bin/x86/Debug/*.msi

  release:
    needs: [build-linux, build-windows]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Downloading Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-linux
          path: build-linux

      - name: Downloading Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-windows
          path: build-windows

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            build-linux/app/build/libs/*.jar
            build-linux/app/build/distributions/*.rpm
            build-linux/app/build/distributions/*.deb
            build-windows/installer/bin/x86/Debug/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true