name: Java CI with Gradle and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-release-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Generate installation package for Red Hat based distros
        run: ./gradlew buildRpm

      - name: Generate installation package for Debian based distros
        run: ./gradlew buildDeb

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            app/build/libs/*.jar
            app/build/distributions/*.rpm
            app/build/distributions/*.deb
          draft: false
          prerelease: false
          generate_release_notes: true

  build-and-release-windows:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.103'

      - name: Build with Gradle
        run: ./gradlew build

      - name: Build .exe file with Gradle
        run: ./gradlew createExe

      - name: Generate installation package for Windows
        working-directory: installer
        run: powershell.exe -File .\Build.ps1 -Version ${{ github.ref_name }}

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            installer/**/*.msi
          draft: false
          prerelease: false
          generate_release_notes: true