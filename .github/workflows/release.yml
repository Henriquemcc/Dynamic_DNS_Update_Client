name: Java CI with Gradle and Release
on:
  push:
    tags:
      - 'v*'

jobs:
  build-linux:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build with Gradle
        run: ./gradlew build

      - name: Generate installation package for Red Hat based distros
        run: ./gradlew buildRpm

      - name: Generate installation package for Debian based distros
        run: ./gradlew buildDeb

      - name: Uploading artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-linux
          path: |
            app/build/libs/*.jar
            app/build/distributions/*.rpm
            app/build/distributions/*.deb

  build-windows:
    needs: [build-linux]
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downloading Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-linux
          path: build-linux

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.0.103'

      - name: Creating directory for app.jar
        run: New-Item -Path app\build\libs -ItemType Directory -Force

      - name: Copying app.jar file
        run: Copy-Item -Path build-linux\libs\app.jar -Destination app\build\libs\app.jar

      - name: Generate installation package for Windows
        working-directory: installer/windows
        run: powershell.exe -File .\Build.ps1 -Version ${{ github.ref_name }}

      - name: Uploading artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-windows
          path: installer/windows/bin/x86/Debug/*.msi

  build-mac:
    needs: [build-linux]
    runs-on: macos-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Downloading Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-linux
          path: build-linux

      - name: Set up JDK 25
        uses: actions/setup-java@v5
        with:
          java-version: '25'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Creating directory for app.jar
        run: mkdir -p app/build/libs

      - name: Copying app.jar file
        run: cp build-linux/libs/app.jar app/build/libs/app.jar

      - name: Generate installation package for Mac OS
        working-directory: installer/mac
        run: bash ./Build.sh

      - name: Uploading artifacts
        uses: actions/upload-artifact@v7
        with:
          name: build-mac
          path: installer/mac/build/*.pkg

  release:
    needs: [build-linux, build-windows, build-mac]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Downloading Linux artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-linux
          path: build-linux

      - name: Downloading Windows artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-windows
          path: build-windows

      - name: Downloading Mac artifacts
        uses: actions/download-artifact@v8
        with:
          name: build-mac
          path: build-mac

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          files: |
            build-linux/libs/*.jar
            build-linux/distributions/*.rpm
            build-linux/distributions/*.deb
            build-windows/*.msi
            build-mac/*.pkg
          draft: false
          prerelease: false
          generate_release_notes: true